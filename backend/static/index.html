<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PM MVP Backend Scaffold</title>
    <style>
      :root {
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
      }
      .card {
        width: min(680px, 92vw);
        background: #fff;
        border: 1px solid #d9dee9;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(3, 33, 71, 0.08);
      }
      h1 {
        margin: 0 0 10px;
        color: #032147;
      }
      p {
        margin: 0 0 12px;
        color: #334155;
        line-height: 1.4;
      }
      code {
        padding: 2px 6px;
        border-radius: 6px;
        background: #eef3ff;
      }
      #health {
        margin-top: 14px;
        font-weight: 700;
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello from the PM MVP backend scaffold</h1>
      <p>This static page is served by FastAPI at <code>/</code>.</p>
      <p>This page calls <code>/api/health</code> on load:</p>
      <p id="health">Checking API...</p>
    </main>
    <script>
      (async () => {
        const health = document.getElementById("health");
        try {
          const response = await fetch("/api/health");
          const data = await response.json();
          health.textContent = `API status: ${data.status}`;
        } catch (error) {
          health.textContent = "API status: error";
          health.style.color = "#dc2626";
        }
      })();
    </script>
  </body>
</html>
